<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Home{% endblock %} · Smile Classifier</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">😊 Smile Classifier</div>
    <ul class="nav-links">
      <li><a href="/" class="{% if active == 'home' %}active{% endif %}">Home</a></li>
      <li><a href="/train" class="{% if active == 'train' %}active{% endif %}">Train</a></li>
      <li><a href="/classify" class="{% if active == 'classify' %}active{% endif %}">Classify</a></li>
      <li><a href="/history" class="{% if active == 'history' %}active{% endif %}">History</a></li>
    </ul>
  </nav>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">Smile Classifier · ID 30221</footer>
</body>
</html>
