services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: smile-classifier-30221:latest
    container_name: smile_app_30221
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "8000:8000"
    volumes:
      - ./app/static/uploads:/app/app/static/uploads
      - ./model:/app/model
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - smile_net

networks:
  smile_net:
    external: true
    name: YSDTP_B5_AI_30221